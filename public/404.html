<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lucida — page not found</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .nf { min-height: 100dvh; display: grid; place-items: center; text-align: center; padding: 1.5rem; }
  .nf .code { font-family: var(--font-display); font-weight: 700; font-size: clamp(4rem, 18vw, 8rem); line-height: 1; }
  .nf .code .hl { background: linear-gradient(transparent 55%, var(--yellow) 55%); padding: 0 .08em; }
  .nf h1 { font-family: var(--font-display); font-size: 1.6rem; margin: .6rem 0 .2rem; }
  .nf p { color: var(--ink-soft); font-size: 1.15rem; margin: 0 0 1.6rem; }
  .nf img { width: 56px; height: 56px; margin: 0 auto 1rem; opacity: .9; }
</style>
</head>
<body class="paper-bg">
  <div class="nf">
    <div>
      <img src="assets/logo.svg" alt="">
      <div class="code display">4<span class="hl">0</span>4</div>
      <h1>This page wandered off the page.</h1>
      <p class="hand" style="font-size:1.25rem">Nothing to trace here.</p>
      <a class="btn btn--lg btn--yellow wobble" href="/">← Back to Lucida</a>
    </div>
  </div>
</body>
</html>
