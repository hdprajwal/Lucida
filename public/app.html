<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lucida — studio</title>
<meta name="theme-color" content="#22201D">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  html, body { height: 100%; overflow: hidden; background: #22201D; }
  body { color: var(--paper); }

  /* ---- splash ---- */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    display: grid; place-items: center; background: var(--paper);
    transition: opacity .5s ease, transform .5s ease;
  }
  #splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
  #splash .mark { width: min(44vw, 188px); transform-origin: center; opacity: 0;
                  animation: spin-in .9s cubic-bezier(.2,.8,.2,1) forwards .1s; }
  #splash .word { font-family: var(--font-display); font-weight: 700; font-size: 2rem;
                  text-align: center; margin-top: 1.1rem; opacity: 0; animation: pop .4s ease forwards .8s; }
  @keyframes spin-in { from { opacity:0; transform: rotate(-150deg) scale(.55);} to { opacity:1; transform: rotate(0) scale(1);} }
  @keyframes pop  { from { opacity:0; transform: scale(.4) rotate(-15deg);} to { opacity:1; transform: scale(1) rotate(0);} }

  /* ---- stage / layers ---- */
  #stage { position: fixed; inset: 0; overflow: hidden; background:#000; }
  #cam, #freeze {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; background:#000;
  }
  #freeze { display: none; }
  #overlay {
    position: absolute; top: 50%; left: 50%;
    transform-origin: center center;
    will-change: transform, opacity, filter;
    touch-action: none;
    max-width: none;
  }
  #grid {
    position: absolute; inset: 0; pointer-events: none; display: none;
    background-image:
      linear-gradient(var(--gridc,rgba(255,255,255,.6)) 1.5px, transparent 1.5px),
      linear-gradient(90deg, var(--gridc,rgba(255,255,255,.6)) 1.5px, transparent 1.5px);
    background-size: 33.33% 33.33%, 33.33% 33.33%;
  }
  #grid.show { display: block; }

  /* ---- camera-enable / error gate ---- */
  #gate {
    position: absolute; inset: 0; z-index: 40; display: grid; place-items: center;
    padding: 1.5rem; text-align: center; background: rgba(34,32,29,.92); color: var(--paper);
  }
  #gate.hide { display: none; }
  #gate .card { background: var(--paper); color: var(--ink); max-width: 360px; }
  #gate .icon { width: 76px; height: 76px; margin: 0 auto .6rem; }
  #gate h2 { font-family: var(--font-display); margin: .3rem 0 .5rem; }
  #gate p  { color: var(--ink-soft); margin: 0 0 1.2rem; }

  /* ---- top bar ---- */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: max(.7rem, env(safe-area-inset-top)) .9rem .7rem; gap: .6rem;
    background: linear-gradient(rgba(34,32,29,.55), transparent);
    transition: opacity .3s ease, transform .3s ease;
  }
  #topbar a.home { display:flex; align-items:center; gap:.4rem; text-decoration:none; color:var(--paper); }
  #topbar a.home img { width:30px; height:30px; }
  #topbar .wordmark { font-size:1.2rem; }
  .mini {
    width:44px; height:44px; display:grid; place-items:center;
    background: rgba(251,245,230,.92); color: var(--ink);
    border:2.5px solid var(--ink); border-radius:50%; box-shadow:2px 2px 0 var(--shadow);
  }
  .mini svg { width:22px; height:22px; }
  .topbar-tools { display:flex; gap:.5rem; }

  /* ---- bottom toolbar ---- */
  #toolbar {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: .8rem .8rem max(1rem, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: .7rem; align-items: center;
    transition: opacity .3s ease, transform .3s ease;
  }
  body.minimal #toolbar, body.minimal #topbar { opacity: 0; transform: translateY(20px); pointer-events: none; }
  body.minimal #topbar { transform: translateY(-20px); }

  /* opacity is always visible — the primary control */
  .opacity-bar {
    width: min(560px, 94vw); background: rgba(251,245,230,.95); color: var(--ink);
    border:2.5px solid var(--ink); border-radius: var(--r-pill);
    box-shadow: 4px 4px 0 var(--shadow); padding: .55rem 1rem;
    display:flex; align-items:center; gap:.8rem;
  }
  .opacity-bar .lbl { font-family:var(--font-display); font-weight:600; white-space:nowrap; }
  .opacity-bar .pct { font-family:var(--font-hand); font-size:1.2rem; min-width:3ch; text-align:right; }

  .tool-row { display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center; max-width:96vw; }

  /* ---- bottom sheet (control panels) ---- */
  .sheet {
    position: absolute; left:0; right:0; bottom:0; z-index: 50;
    background: var(--paper); color: var(--ink);
    border-top: 3px solid var(--ink); border-radius: 26px 26px 0 0;
    box-shadow: 0 -6px 0 rgba(34,32,29,.15);
    padding: 1rem 1.2rem max(1.4rem, env(safe-area-inset-bottom));
    transform: translateY(110%); transition: transform .28s cubic-bezier(.2,.8,.2,1);
    max-height: 70vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet .grip { width:48px; height:6px; background:var(--ink); border-radius:6px; margin:.1rem auto .9rem; opacity:.4; }
  .sheet h3 { font-family:var(--font-display); margin:.2rem 0 1rem; display:flex; align-items:center; gap:.5rem; }
  .field { margin: 0 0 1.1rem; }
  .field label { display:flex; justify-content:space-between; font-weight:600; margin-bottom:.4rem; }
  .field .val { font-family:var(--font-hand); font-size:1.15rem; color:var(--ink-soft); }
  .switch-row { display:flex; gap:.6rem; flex-wrap:wrap; }
  .sheet-actions { display:flex; justify-content:flex-end; gap:.6rem; margin-top:.4rem; }

  /* ---- history drawer ---- */
  #drawer {
    position:absolute; top:0; right:0; bottom:0; z-index: 60; width: min(420px, 88vw);
    background: var(--paper); color: var(--ink); border-left:3px solid var(--ink);
    transform: translateX(110%); transition: transform .3s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column;
  }
  #drawer.open { transform: translateX(0); }
  #drawer header { display:flex; align-items:center; justify-content:space-between;
                   padding: max(1rem, env(safe-area-inset-top)) 1.1rem .8rem; border-bottom:2px dashed var(--ink); }
  #drawer header h2 { font-family:var(--font-display); margin:0; font-size:1.4rem; }
  #gallery { padding:1rem; overflow-y:auto; display:grid; grid-template-columns:1fr 1fr; gap:1rem; align-content:start; }
  .pg { position:relative; background:#fff; border:2.5px solid var(--ink); border-radius:8px;
        box-shadow:3px 3px 0 var(--shadow); overflow:hidden; cursor:pointer; transform:rotate(var(--t,0deg)); }
  .pg img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:var(--paper-2); }
  .pg .meta { padding:.4rem .5rem; font-size:.8rem; }
  .pg .meta b { font-family:var(--font-display); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pg .meta span { color:var(--ink-soft); font-size:.72rem; }
  .pg .del { position:absolute; top:4px; right:4px; width:28px; height:28px; border-radius:50%;
             background:var(--coral); color:#fff; border:2px solid var(--ink); display:grid; place-items:center;
             font-weight:700; line-height:1; padding:0; }
  #empty { grid-column:1/-1; text-align:center; color:var(--ink-soft); padding:2rem 1rem; }
  #empty svg { width:120px; margin:0 auto 1rem; }

  .scrim { position:absolute; inset:0; z-index:45; background:rgba(34,32,29,.45); opacity:0; pointer-events:none; transition:opacity .25s; }
  .scrim.show { opacity:1; pointer-events:auto; }

  .toast {
    position:absolute; left:50%; top:18%; transform:translateX(-50%) rotate(-1deg); z-index:80;
    background:var(--ink); color:var(--paper); padding:.6rem 1.1rem; border-radius:var(--r-pill);
    font-family:var(--font-hand); font-size:1.1rem; box-shadow:3px 3px 0 rgba(0,0,0,.3);
    opacity:0; transition:opacity .2s, transform .2s; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(-6px) rotate(-1deg); }
</style>
</head>

      <div class="word">Lucida</div>
    </div>
  </div>

  <!-- stage -->
  <div id="stage">
    <video id="cam" playsinline autoplay muted></video>
    <canvas id="freeze"></canvas>
    <canvas id="overlay"></canvas>
    <div id="grid"></div>
  </div>

  <!-- camera enable / error gate -->
  <div id="gate">
    <div class="card">
      <svg class="icon" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="20" width="48" height="34" rx="6" stroke="#22201D" stroke-width="3.5"/>
        <path d="M22 20 l5 -8 h10 l5 8" stroke="#22201D" stroke-width="3.5" fill="none" stroke-linejoin="round"/>
        <circle cx="32" cy="37" r="9" stroke="#22201D" stroke-width="3.5" fill="#FFD23F"/>
      </svg>
      <h2 id="gate-title">Point your phone at the paper</h2>
      <p id="gate-msg">Lucida needs your camera to show the page underneath. Nothing is recorded or uploaded.</p>
      <button class="btn btn--yellow" id="enable-cam">Enable camera</button>
    </div>
  </div>

  <!-- top bar -->
  <div id="topbar">
    <a class="home" href="index.html" title="Home"><img src="assets/logo.svg" alt=""><span class="wordmark">Lucida</span></a>
    <div class="topbar-tools">
      <button class="mini" id="btn-minimal" title="Hide controls (tap screen to bring back)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 6h16M4 12h10M4 18h16"/></svg>
      </button>
      <button class="mini" id="btn-history" title="History">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v6h6"/><path d="M3.5 9a9 9 0 1 1-1 5"/><path d="M12 7v5l4 2"/></svg>
      </button>
    </div>
  </div>

  <!-- bottom toolbar -->
  <div id="toolbar">
    <div class="opacity-bar">
      <span class="lbl">Opacity</span>
      <input class="slider" id="opacity" type="range" min="0" max="100" value="50" aria-label="Image opacity">
      <span class="pct" id="opacity-val">50%</span>
    </div>
    <div class="tool-row">
      <button class="tool" id="t-load" title="Load image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M21 17l-5-5L5 21"/></svg>
      </button>
      <button class="tool" id="t-lock" title="Lock position" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      </button>
      <button class="tool" id="t-flip" title="Flip horizontally">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M7 7l-4 5 4 5"/><path d="M17 7l4 5-4 5"/></svg>
      </button>
      <button class="tool" id="t-edges" title="Edge detection" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18c4-10 12-10 16 0"/><path d="M4 18h16" stroke-dasharray="2 3"/></svg>
      </button>
      <button class="tool" id="t-filters" title="Image filters">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6"/><circle cx="15" cy="15" r="6"/></svg>
      </button>
      <button class="tool" id="t-grid" title="Grid" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      </button>
      <button class="tool" id="t-freeze" title="Freeze frame" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M4.5 4.5l15 15M19.5 4.5l-15 15"/></svg>
      </button>
      <button class="tool" id="t-reset" title="Reset position">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  </div>

  <!-- filters sheet -->
  <div class="sheet" id="sheet-filters">
    <div class="grip"></div>
    <h3>🎨 Image filters</h3>
    <div class="field">
      <label>Grayscale <span class="val" id="v-gray">0%</span></label>
      <input class="slider" id="f-gray" type="range" min="0" max="100" value="0">
    </div>
    <div class="field">
      <label>Contrast <span class="val" id="v-contrast">100%</span></label>
      <input class="slider" id="f-contrast" type="range" min="0" max="300" value="100">
    </div>
    <div class="field">
      <label>Brightness <span class="val" id="v-bright">100%</span></label>
      <input class="slider" id="f-bright" type="range" min="0" max="300" value="100">
    </div>
    <div class="switch-row">
      <button class="btn" id="f-invert" aria-pressed="false">Invert colors</button>
      <button class="btn btn--ghost" id="f-reset">Reset filters</button>
    </div>
    <div class="sheet-actions"><button class="btn btn--yellow" data-close-sheet>Done</button></div>
  </div>

  <!-- edges sheet -->
  <div class="sheet" id="sheet-edges">
    <div class="grip"></div>
    <h3>✏️ Edge detection</h3>
    <p class="hand" style="font-size:1.1rem;margin:.2rem 0 1rem;color:var(--ink-soft)">Turns the photo into clean line-art — easier to trace.</p>
    <div class="switch-row" style="margin-bottom:1rem">
      <button class="btn btn--coral" id="e-toggle" aria-pressed="false">Turn on edges</button>
    </div>
    <div class="field">
      <label>Sensitivity <span class="val" id="v-threshold">30%</span></label>
      <input class="slider" id="e-threshold" type="range" min="5" max="80" value="30">
    </div>
    <div class="sheet-actions"><button class="btn btn--yellow" data-close-sheet>Done</button></div>
  </div>

  <!-- history drawer -->
  <div id="drawer">
    <header>
      <h2>📒 Your tracings</h2>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn--ghost" id="clear-all" style="padding:.4rem .9rem">Clear all</button>
        <button class="mini" id="close-drawer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>
    </header>
    <div id="gallery"></div>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="toast" id="toast"></div>

  <input type="file" id="file-input" accept="image/*" class="sr-only">

<script src="assets/store.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
